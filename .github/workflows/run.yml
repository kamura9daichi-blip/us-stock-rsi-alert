name: Run RSI Alert

on:
  schedule:
  - cron: "7 7 * * *"   # JST 16:07（夜7時）
  workflow_dispatch:        # 手動実行も可能

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install yfinance ta requests

      - name: Run script
        env:
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          SENDGRID_SENDER: ${{ secrets.SENDGRID_SENDER }}
          SENDGRID_TO: ${{ secrets.SENDGRID_TO }}
        run: |
          python rsi_alert.py
